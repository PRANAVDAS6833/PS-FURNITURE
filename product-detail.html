<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title id="page-title">Product Details – PS Furniture</title>
  <meta name="description" id="page-desc" content="View detailed specifications, images and pricing for this PS Furniture product."/>
  <link rel="stylesheet" href="css/style.css"/>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    .detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .gallery { position: sticky; top: 90px; }
    .gallery-main { border-radius: var(--radius-lg); overflow: hidden; height: 480px; margin-bottom: 14px; }
    .gallery-main img { width:100%; height:100%; object-fit:cover; cursor:zoom-in; transition:transform 0.4s ease; }
    .gallery-main:hover img { transform: scale(1.04); }
    .gallery-thumbs { display: flex; gap: 10px; }
    .gallery-thumb { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: var(--transition); flex-shrink: 0; }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; }
    .gallery-thumb.active { border-color: var(--gold); }
    .gallery-thumb:hover { border-color: var(--gold-light); }
    .detail-info { padding: 8px 0; }
    .detail-cat-tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .detail-name { font-size: clamp(1.8rem,3vw,2.4rem); line-height: 1.2; margin-bottom: 16px; }
    .detail-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .detail-price { margin-bottom: 24px; }
    .detail-price-main { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--gold); }
    .detail-price-original { font-size: 1rem; color: var(--text-muted); text-decoration: line-through; margin-left: 10px; }
    .detail-price-save { display: inline-block; margin-left: 10px; font-size: 0.8rem; background: rgba(37,211,102,0.12); color: #25D366; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .detail-desc { color: var(--text-secondary); line-height: 1.75; font-size: 1rem; margin-bottom: 28px; }
    .detail-divider { height: 1px; background: var(--border); margin: 24px 0; }
    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table tr { border-bottom: 1px solid var(--border); }
    .specs-table td { padding: 10px 0; font-size: 0.9rem; }
    .specs-table td:first-child { color: var(--text-muted); width: 40%; font-weight: 500; }
    .specs-table td:last-child { color: var(--text-primary); font-weight: 500; }
    .detail-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
    .detail-actions .btn { justify-content: center; font-size: 1rem; padding: 14px; }
    .related-section { margin-top: 80px; }
    .not-found { text-align:center; padding:100px 20px; }
    @media(max-width:900px) { .detail-layout{grid-template-columns:1fr;} .gallery{position:static;} .gallery-main{height:320px;} }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<main>
  <section class="section-pad" style="padding-top:100px;" id="product-section">
    <div class="container">
      <div id="breadcrumb" style="margin-bottom:28px;font-size:0.85rem;color:var(--text-muted);"></div>
      <div class="detail-layout" id="detail-layout"></div>
      <div class="related-section" id="related-section"></div>
    </div>
  </section>
</main>
<div id="footer-root"></div>
<script src="js/data.js"></script>
<script>
  document.getElementById('navbar-root').innerHTML = renderNavbarRoot('products');
  document.getElementById('footer-root').innerHTML = renderFooter();

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const products = getProducts();
  const p = products.find(x => x.id === id);

  if (!p || !p.active) {
    document.getElementById('detail-layout').innerHTML = `<div class="not-found" style="grid-column:1/-1;"><div style="font-size:3rem;margin-bottom:16px;">🛋️</div><h2>Product not found</h2><p style="margin:12px 0 24px;color:var(--text-secondary);">This product may have been removed or is unavailable.</p><a href="products.html" class="btn btn-gold">Browse All Products</a></div>`;
  } else {
    document.title = `${p.name} – PS Furniture`;
    document.getElementById('page-desc').content = p.description;

    let currentImg = p.images[0];
    const savings = p.originalPrice ? p.originalPrice - p.price : 0;
    const savePct = savings ? Math.round((savings / p.originalPrice) * 100) : 0;

    // Breadcrumb
    document.getElementById('breadcrumb').innerHTML = `<a href="index.html" style="color:var(--gold);">Home</a> › <a href="products.html" style="color:var(--gold);">Products</a> › <a href="products.html?cat=${p.category}" style="color:var(--gold);">${p.category}</a> › ${p.name}`;

    // Specs rows
    const specRows = Object.entries(p.specs || {}).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

    // Thumbs
    const thumbs = p.images.map((img, i) => `<div class="gallery-thumb ${i===0?'active':''}" onclick="setImg('${img}',this)"><img src="${img}" alt="${p.name} view ${i+1}" loading="lazy"/></div>`).join('');

    document.getElementById('detail-layout').innerHTML = `
      <div class="gallery">
        <div class="gallery-main"><img src="${p.images[0]}" alt="${p.name}" id="main-img"/></div>
        <div class="gallery-thumbs">${thumbs}</div>
      </div>
      <div class="detail-info">
        <div class="detail-cat-tags">
          <span class="badge badge-gold">${p.category}</span>
          ${p.tags.map(t=>`<span class="badge badge-gold">${t}</span>`).join('')}
          ${p.featured ? '<span class="badge badge-green">⭐ Featured</span>' : ''}
        </div>
        <h1 class="detail-name">${p.name}</h1>
        <div class="detail-rating">
          <span class="stars" style="font-size:1.1rem;">${renderStars(p.rating)}</span>
          <span style="font-weight:700;color:var(--gold);">${p.rating}</span>
          <span style="color:var(--text-muted);font-size:0.875rem;">(${p.reviews} reviews)</span>
        </div>
        <div class="detail-price">
          <span class="detail-price-main">${formatPrice(p.price)}</span>
          ${p.originalPrice ? `<span class="detail-price-original">${formatPrice(p.originalPrice)}</span><span class="detail-price-save">Save ${savePct}%</span>` : ''}
        </div>
        <p class="detail-desc">${p.description}</p>
        <div class="detail-divider"></div>
        <h3 style="font-size:1rem;margin-bottom:16px;font-family:'Inter',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);">Specifications</h3>
        <table class="specs-table"><tbody>${specRows}</tbody></table>
        <div class="detail-actions">
          <button class="btn btn-gold" onclick="addToCart(p.id)">🛒 Add to Shopping Cart</button>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <a id="wa-buy" href="${getProductWALink(p)}" target="_blank" class="btn btn-whatsapp">💬 WhatsApp</a>
            <a href="${getIGLink()}" target="_blank" class="btn btn-outline" style="background:#E1306C;color:white;border:none;">📸 Instagram</a>
          </div>
          <a href="${getFBLink()}" target="_blank" class="btn btn-outline" style="background:#1877F2;color:white;border:none;">📘 Facebook Messenger</a>
          <a id="phone-contact-btn" href="contact.html" class="btn btn-outline">📞 Contact Us for Pricing</a>
        </div>
        <div style="margin-top:20px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);font-size:0.85rem;color:var(--text-secondary);">
          🚚 <strong style="color:var(--text-primary);">Free delivery</strong> across Kerala &nbsp;·&nbsp; 🏭 <strong style="color:var(--text-primary);">In-house manufactured</strong> &nbsp;·&nbsp; 🛡️ <strong style="color:var(--text-primary);">5-year warranty</strong>
        </div>
      </div>`;

    // Related products
    const related = products.filter(x => x.active && x.category === p.category && x.id !== p.id).slice(0,4);
    if (related.length) {
      document.getElementById('related-section').innerHTML = `
        <div class="section-header" style="text-align:left;margin-bottom:32px;"><h2>More in <span class="gold">${p.category}</span></h2><div class="gold-line" style="margin:12px 0 0;"></div></div>
        <div class="product-grid">${related.map(r => `
          <div class="product-card" onclick="location.href='product-detail.html?id=${r.id}'">
            <div class="product-card-img"><img src="${r.images[0]}" alt="${r.name}" loading="lazy"/></div>
            <div class="product-card-body">
              <div class="product-card-cat">${r.category}</div>
              <div class="product-card-name">${r.name}</div>
              <div class="product-card-footer">
                <div class="product-card-price">${formatPrice(r.price)}</div>
                <a href="${getProductWALink(r)}" target="_blank" onclick="event.stopPropagation()" class="icon-btn icon-btn-wa">💬</a>
              </div>
            </div>
          </div>`).join('')}</div>`;
    }
    if (contact.hidePhone) {
      const btn = document.getElementById('phone-contact-btn');
      if (btn) btn.style.display = 'none';
    }
  }

  function setImg(src, thumbEl) {
    document.getElementById('main-img').src = src;
    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
    thumbEl.classList.add('active');
  }
</script>
</body>
</html>
