<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Products – PS Furniture | Browse Our Full Collection</title>
  <meta name="description" content="Browse PS Furniture's full collection of premium sofas, beds, dining tables, office chairs and more. Filter by category and find your perfect piece."/>
  <link rel="stylesheet" href="css/style.css"/>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    .products-layout { display: grid; grid-template-columns: 240px 1fr; gap: 36px; align-items: start; }
    .sidebar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; position: sticky; top: 90px; }
    .sidebar h3 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); margin-bottom: 14px; }
    .sidebar-cats { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-cat { padding: 9px 14px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-size: 0.875rem; color: var(--text-secondary); transition: var(--transition); background: none; text-align: left; font-family: 'Inter',sans-serif; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-cat:hover, .sidebar-cat.active { background: rgba(201,168,76,0.1); color: var(--gold); border-color: var(--border-gold); font-weight: 600; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 20px 0; }
    .sort-select { width: 100%; }
    .products-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .result-count { font-size: 0.9rem; color: var(--text-secondary); }
    .result-count strong { color: var(--gold); }
    .no-results { text-align: center; padding: 80px 20px; }
    .no-results .icon { font-size: 3rem; margin-bottom: 16px; }
    .no-results h3 { font-size: 1.4rem; margin-bottom: 8px; }
    .no-results p { color: var(--text-secondary); }
    @media(max-width:900px) { .products-layout{grid-template-columns:1fr;} .sidebar{position:static;display:none;} }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<main>
  <div class="page-header">
    <div class="container">
      <span class="badge badge-gold">Our Collection</span>
      <h1 style="margin-top:14px;">Premium <span class="gold">Furniture</span></h1>
      <p>Explore our handcrafted collection — from statement sofas to bespoke bedroom sets.</p>
    </div>
  </div>

  <section class="section-pad" style="padding-top:40px;">
    <div class="container">
      <!-- Search -->
      <div class="filter-bar" style="margin-bottom:28px;">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search furniture…" oninput="applyFilter()"/>
        </div>
        <select class="form-control sort-select" id="sort-select" onchange="applyFilter()" style="max-width:200px;">
          <option value="">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>

      <div class="products-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
          <h3>Categories</h3>
          <div class="sidebar-cats" id="sidebar-cats">
            <button class="sidebar-cat active" data-cat="All" onclick="selectCat('All',this)">All Products <span id="cat-count-all"></span></button>
          </div>
          <div class="sidebar-divider"></div>
          <h3>Show</h3>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:var(--text-secondary);">
              <input type="checkbox" id="show-featured" onchange="applyFilter()" style="accent-color:var(--gold)"/> Featured only
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:var(--text-secondary);">
              <input type="checkbox" id="show-sale" onchange="applyFilter()" style="accent-color:var(--gold)"/> On Sale
            </label>
          </div>
        </aside>

        <!-- Products -->
        <div>
          <div class="products-top">
            <p class="result-count">Showing <strong id="count-display">0</strong> products</p>
            <!-- Mobile cat pills -->
            <div class="cat-filters" id="mobile-cats" style="display:flex;"></div>
          </div>
          <div class="product-grid" id="products-grid"></div>
          <div id="no-results" class="no-results" style="display:none;">
            <div class="icon">🔍</div>
            <h3>No products found</h3>
            <p>Try a different search or category</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
<div id="footer-root"></div>
<script src="js/data.js"></script>
<script>
  document.getElementById('navbar-root').innerHTML = renderNavbarRoot('products');
  document.getElementById('footer-root').innerHTML = renderFooter();

  let activeCat = 'All';

  function buildSidebar() {
    const cats = ['All', ...getCategories()];
    const products = getProducts().filter(p => p.active);
    const sidebar = document.getElementById('sidebar-cats');
    const mobile = document.getElementById('mobile-cats');
    sidebar.innerHTML = '';
    mobile.innerHTML = '';
    cats.forEach(cat => {
      const count = cat === 'All' ? products.length : products.filter(p => p.category === cat).length;
      const btn = document.createElement('button');
      btn.className = 'sidebar-cat' + (cat === activeCat ? ' active' : '');
      btn.dataset.cat = cat;
      btn.innerHTML = `${cat} <span style="color:var(--text-muted);font-size:0.78rem;">${count}</span>`;
      btn.onclick = () => selectCat(cat, btn);
      sidebar.appendChild(btn);
      const pill = document.createElement('button');
      pill.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
      pill.textContent = cat;
      pill.onclick = () => { activeCat = cat; buildSidebar(); applyFilter(); };
      mobile.appendChild(pill);
    });
  }

  function selectCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.sidebar-cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.cat-btn').forEach(b => { b.classList.toggle('active', b.textContent === cat); });
    applyFilter();
  }

  function applyFilter() {
    let products = getProducts().filter(p => p.active);
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const sort = document.getElementById('sort-select').value;
    const featureOnly = document.getElementById('show-featured').checked;
    const saleOnly = document.getElementById('show-sale').checked;
    if (activeCat !== 'All') products = products.filter(p => p.category === activeCat);
    if (q) products = products.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
    if (featureOnly) products = products.filter(p => p.featured);
    if (saleOnly) products = products.filter(p => p.tags && p.tags.includes('Sale'));
    if (sort === 'price-asc') products.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') products.sort((a,b) => b.price - a.price);
    else if (sort === 'rating') products.sort((a,b) => b.rating - a.rating);
    else if (sort === 'name') products.sort((a,b) => a.name.localeCompare(b.name));
    document.getElementById('count-display').textContent = products.length;
    const grid = document.getElementById('products-grid');
    const noRes = document.getElementById('no-results');
    if (!products.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
    noRes.style.display = 'none';
    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
        <div class="product-card-img">
          <img src="${p.images[0]}" alt="${p.name}" loading="lazy"/>
          <div class="product-card-badge">${p.tags.length ? `<span class="badge badge-gold">${p.tags[0]}</span>` : ''}</div>
        </div>
        <div class="product-card-body">
          <div class="product-card-cat">${p.category}</div>
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-desc">${p.description}</div>
          <div class="product-card-rating"><span class="stars">${renderStars(p.rating)}</span><span class="rating-count">(${p.reviews})</span></div>
          <div class="product-card-footer">
            <div><div class="product-card-price">${formatPrice(p.price)}</div>${p.originalPrice ? `<small style="color:var(--text-muted);text-decoration:line-through;">${formatPrice(p.originalPrice)}</small>` : ''}</div>
            <div class="product-card-btns">
              <a href="${getProductWALink(p)}" target="_blank" onclick="event.stopPropagation()" class="icon-btn icon-btn-wa" title="WhatsApp">💬</a>
              <button class="icon-btn icon-btn-gold" title="Add to Cart" onclick="event.stopPropagation();addToCart(${p.id})">🛒</button>
              <button class="icon-btn icon-btn-gold" onclick="event.stopPropagation();location.href='product-detail.html?id=${p.id}'">→</button>
            </div>
          </div>
        </div>
      </div>`).join('');
  }

  // Check URL params for category
  const urlParams = new URLSearchParams(window.location.search);
  const catParam = urlParams.get('cat');
  if (catParam) activeCat = catParam;

  buildSidebar();
  applyFilter();
</script>
</body>
</html>
