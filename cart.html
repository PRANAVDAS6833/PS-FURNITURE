<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Shopping Cart – PS Furniture</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 40px; }
    .cart-summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; position: sticky; top: 90px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.95rem; color: var(--text-secondary); }
    .summary-total { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 16px; color: var(--gold); font-size: 1.3rem; font-weight: 700; font-family: 'Playfair Display', serif; }
    .empty-cart { text-align: center; padding: 100px 20px; }
    .empty-cart .icon { font-size: 4rem; margin-bottom: 24px; opacity: 0.5; }
    @media(max-width:900px) { .cart-layout { grid-template-columns: 1fr; } .cart-summary { position: static; } }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<main>
  <div class="page-header">
    <div class="container">
      <h1>Your <span class="gold">Shopping Cart</span></h1>
      <p>Review your selection and proceed to checkout.</p>
    </div>
  </div>

  <section class="section-pad" style="padding-top:20px;">
    <div class="container">
      <div id="cart-content">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>
</main>
<div id="footer-root"></div>

<script src="js/data.js"></script>
<script>
  document.getElementById('navbar-root').innerHTML = renderNavbarRoot('cart');
  document.getElementById('footer-root').innerHTML = renderFooter();

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-content');
    
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p style="margin:16px 0 28px;color:var(--text-secondary);">Browse our collection and find something beautiful for your home.</p>
          <a href="products.html" class="btn btn-gold">Explore Collection</a>
        </div>`;
      return;
    }

    const itemsHtml = cart.map(item => `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}" class="cart-item-img"/>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>
          <button class="remove-btn" onclick="removeFromCart(${item.id}); renderCart();">Remove Item</button>
        </div>
        <div class="cart-controls">
          <button class="qty-btn" onclick="updateCartQuantity(${item.id}, ${item.quantity - 1}); renderCart();">−</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" onclick="updateCartQuantity(${item.id}, ${item.quantity + 1}); renderCart();">+</button>
        </div>
        <div style="font-weight:700;min-width:100px;text-align:right;">${formatPrice(item.price * item.quantity)}</div>
      </div>
    `).join('');

    const total = getCartTotal();

    container.innerHTML = `
      <div class="cart-layout">
        <div>${itemsHtml}</div>
        <aside class="cart-summary">
          <h3 style="margin-bottom:24px;">Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>${formatPrice(total)}</span></div>
          <div class="summary-row"><span>GST (Tax)</span><span>Inclusive</span></div>
          <div class="summary-row"><span>Shipping</span><span style="color:#25D366;font-weight:600;">FREE</span></div>
          <div class="summary-row summary-total"><span>Total Amount</span><span>${formatPrice(total)}</span></div>
          <button onclick="window.location.href='checkout.html'" class="btn btn-gold" style="width:100%;margin-top:24px;justify-content:center;">Proceed to Checkout →</button>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:20px;text-align:center;">Secure checkout with PS Furniture</p>
        </aside>
      </div>`;
  }

  renderCart();
</script>
</body>
</html>
